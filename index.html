<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Learning Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">


<aside class="sidebar">

<h2>Smart Learning</h2>

<ul>

<li class="active">
<i class="fa-solid fa-house"></i>
Dashboard
</li>

<li>
<i class="fa-solid fa-book"></i>
Assignments
</li>

<li>
<i class="fa-solid fa-calendar-check"></i>
Attendance
</li>

<li>
<i class="fa-solid fa-note-sticky"></i>
Notes
</li>

<li id="themeToggle">
<i class="fa-solid fa-moon"></i>
Dark Mode
</li>

</ul>

</aside>


<main class="main">

<header>

<h1>Student Dashboard</h1>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Assignment or Note">

<i class="fa-solid fa-magnifying-glass"></i>

</div>

</header>


<section class="cards">

<div class="card">

<h3>Total Assignments</h3>

<p id="totalAssignments">0</p>

</div>

<div class="card">

<h3>Completed</h3>

<p id="completedAssignments">0</p>

</div>

<div class="card">

<h3>Attendance</h3>

<p id="attendanceAverage">0%</p>

</div>

<div class="card">

<h3>Total Notes</h3>

<p id="totalNotes">0</p>

</div>

</section>


<section class="section">

<h2>Assignment Manager</h2>

<div class="form">

<input
type="text"
id="assignmentTitle"
placeholder="Assignment Title">

<input
type="text"
id="assignmentSubject"
placeholder="Subject">

<input
type="date"
id="assignmentDate">

<button id="addAssignment">
Add Assignment
</button>

</div>

<table>

<thead>

<tr>

<th>Title</th>

<th>Subject</th>

<th>Due Date</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="assignmentTable">

</tbody>

</table>

</section>


<section class="section">

<h2>Attendance Tracker</h2>

<div class="form">

<input
type="text"
id="subjectName"
placeholder="Subject">

<input
type="number"
id="presentClasses"
placeholder="Present">

<input
type="number"
id="totalClasses"
placeholder="Total">

<button id="addAttendance">

Save Attendance

</button>

</div>

<table>

<thead>

<tr>

<th>Subject</th>

<th>Present</th>

<th>Total</th>

<th>%</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="attendanceTable">

</tbody>

</table>

</section>


<section class="section">

<h2>Notes</h2>

<div class="form">

<input
type="text"
id="noteTitle"
placeholder="Title">

<textarea
id="noteContent"
placeholder="Write your notes here...">

</textarea>

<button id="addNote">

Save Note

</button>

</div>

<div id="notesContainer" class="notes-grid">

</div>

</section>

</main>

</div>

<script src="js/app.js"></script>

</body>

</html>
